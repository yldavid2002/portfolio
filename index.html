<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Ho | AI & Quality Portfolio</title>
    <!-- Dependencies -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
    <style>
        .text-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoom-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-in { animation: fade-in 0.3s ease-out; }
        .zoom-in { animation: zoom-in 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Github, Linkedin, Mail, Phone, ExternalLink, Award, Terminal, 
            Database, Cpu, Briefcase, GraduationCap, Trophy, ChevronRight, 
            Code, Clock, CheckCircle2, Filter, FileText, X, Target, Zap, 
            ShieldCheck, Search, Network, UserCog 
        } = lucide;

        const App = () => {
            const [activeTier, setActiveTier] = useState('ALL');
            const [activeStatus, setActiveStatus] = useState('ALL');
            const [selectedProject, setSelectedProject] = useState(null);
            const [researchImageUrl, setResearchImageUrl] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);

            const apiKey = ""; // Add your key here if needed

            useEffect(() => {
                const generateResearchImage = async () => {
                    if(!apiKey) return;
                    setIsGenerating(true);
                    try {
                        const prompt = "A highly professional, futuristic, and clean concept art representing 'AI Quality Assurance and Autonomous Agents'. The visual should feature a sophisticated neural network structure overlapping with precise, semi-transparent blueprints and quality checkmarks. Soft blue and teal neon lighting on a dark slate background. High-tech, authoritative, and academic research aesthetic.";
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                            })
                        });
                        const result = await response.json();
                        const base64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        if (base64) setResearchImageUrl(`data:image/png;base64,${base64}`);
                    } catch (error) {
                        console.error("Error:", error);
                    } finally {
                        setIsGenerating(false);
                    }
                };
                generateResearchImage();
            }, []);

            const tierColors = {
                GOLD: 'from-amber-300 via-yellow-500 to-amber-600',
                SILVER: 'from-slate-200 via-slate-400 to-slate-500',
                BRONZE: 'from-orange-400 via-orange-600 to-amber-800'
            };

            const strengths = [
                { subject: 'GenAI / LLMs', value: 90 },
                { subject: 'Data Strategy', value: 80 },
                { subject: 'QA Governance', value: 98 },
                { subject: 'Leadership', value: 88 },
                { subject: 'ML Engineering', value: 80 },
                { subject: 'Agile/SDLC', value: 95 },
            ];

            const projects = [
                { id: 4, tier: 'GOLD', status: 'COMPLETED', title: 'Quality Requirement Framework', description: 'Industry-proven quality requirement framework for all kinds of project implementation.', longDescription: 'A master-level framework refined over 20 years in enterprise QA. Provides a standardized set of testing activities including correctness, performance, compatibility, usability, and more.', tech: ['Testing', 'Test Strategy', 'Test Planning'], color: tierColors.GOLD, pdfUrl: '#' },
                { id: 1, tier: 'BRONZE', status: 'COMPLETED', title: 'Test Strategy Advisor', description: 'AI Agent utilizing MCP to automate software test strategies.', longDescription: 'Leverages LangGraph for agentic reasoning loops to propose risk-based testing strategies.', tech: ['MCP', 'LangGraph', 'LLM', 'RAG'], color: tierColors.BRONZE, pdfUrl: '#' },
                { id: 7, tier: 'BRONZE', status: 'ACTIVE', title: 'AI Governance Framework', description: 'Governance for AI-generated content to mitigate hallucination risks.', longDescription: 'Establishes a "Quality Agent" to monitor outputs for bias, cultural differences, and technical inaccuracies.', tech: ['LLM-as-a-Judge', 'Governance', 'Quality'], color: tierColors.BRONZE, pdfUrl: null }
            ];

            const filteredProjects = projects.filter(p => (activeTier === 'ALL' || p.tier === activeTier) && (activeStatus === 'ALL' || p.status === activeStatus));

            const RadarChart = ({ data, size = 300 }) => {
                const center = size / 2;
                const radius = (size / 2) * 0.7;
                const angleStep = (Math.PI * 2) / data.length;
                const points = data.map((d, i) => {
                    const x = center + radius * (d.value / 100) * Math.cos(i * angleStep - Math.PI / 2);
                    const y = center + radius * (d.value / 100) * Math.sin(i * angleStep - Math.PI / 2);
                    return `${x},${y}`;
                }).join(' ');

                return (
                    <svg width={size} height={size} className="mx-auto overflow-visible">
                        {[0.2, 0.4, 0.6, 0.8, 1].map((p, i) => <circle key={i} cx={center} cy={center} r={radius * p} fill="none" stroke="#1e293b" strokeWidth="1" />)}
                        {data.map((d, i) => {
                            const x = center + radius * Math.cos(i * angleStep - Math.PI / 2);
                            const y = center + radius * Math.sin(i * angleStep - Math.PI / 2);
                            const lx = center + (radius + 35) * Math.cos(i * angleStep - Math.PI / 2);
                            const ly = center + (radius + 20) * Math.sin(i * angleStep - Math.PI / 2);
                            return (
                                <g key={i}>
                                    <line x1={center} y1={center} x2={x} y2={y} stroke="#334155" />
                                    <text x={lx} y={ly} textAnchor="middle" className="fill-slate-400 text-[10px] font-bold uppercase">{d.subject}</text>
                                </g>
                            );
                        })}
                        <polygon points={points} fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" strokeWidth="2" />
                    </svg>
                );
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200 font-sans">
                    {/* Simplified Navbar */}
                    <nav className="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800">
                        <div className="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
                            <span className="text-xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">DAVID HO</span>
                            <div className="hidden md:flex gap-8 text-sm font-medium">
                                <a href="#about" className="text-slate-400 hover:text-blue-400">About</a>
                                <a href="#projects" className="text-slate-400 hover:text-blue-400">AI Projects</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header id="about" className="pt-32 pb-20 px-6 max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                        <div>
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-black mb-6 uppercase tracking-widest">
                                <Trophy size={14} /> Distinguished IT Quality Strategist
                            </div>
                            <h1 className="text-4xl md:text-6xl font-extrabold text-white leading-tight mb-6">
                                Data Science & AI <span className="text-blue-500 text-glow">with Quality focus</span>
                            </h1>
                            <p className="text-lg text-slate-400 mb-8">Accelerating SDLC through strategic adoption of AI Agents and LLMs.</p>
                            <div className="flex gap-4">
                                <a href="mailto:yldavid2002@gmail.com" className="flex items-center gap-2 text-slate-300 hover:text-blue-400"><Mail size={18} /> Email Me</a>
                            </div>
                        </div>
                        <div className="relative aspect-square bg-slate-900 rounded-[3rem] border border-white/10 flex items-center justify-center overflow-hidden">
                            {researchImageUrl ? (
                                <img src={researchImageUrl} className="w-full h-full object-cover opacity-60" />
                            ) : (
                                <Terminal size={120} className="text-blue-500/20" />
                            )}
                            <div className="absolute bottom-8 left-8 right-8 p-6 bg-slate-900/90 backdrop-blur-xl rounded-2xl border border-white/10">
                                <div className="text-xs text-blue-400 font-bold mb-1 uppercase tracking-widest">Research Focus</div>
                                <div className="text-white italic">"Infusing quality in AI evolution"</div>
                            </div>
                        </div>
                    </header>

                    {/* Projects Section */}
                    <section id="projects" className="py-20 px-6 max-w-6xl mx-auto">
                        <h2 className="text-3xl font-bold text-white mb-12">Project Portfolio</h2>
                        <div className="grid md:grid-cols-3 gap-8">
                            {filteredProjects.map(p => (
                                <div key={p.id} className="bg-slate-800/30 border border-slate-700/50 p-8 rounded-3xl hover:border-blue-500 transition-all">
                                    <div className={`text-[10px] font-black mb-2 uppercase ${p.tier === 'GOLD' ? 'text-yellow-500' : 'text-blue-400'}`}>{p.tier} Tier</div>
                                    <h3 className="text-xl font-bold text-white mb-4">{p.title}</h3>
                                    <p className="text-slate-400 text-sm mb-6 line-clamp-3">{p.description}</p>
                                    <div className="flex flex-wrap gap-2">
                                        {p.tech.map(t => <span key={t} className="text-[10px] px-2 py-1 bg-slate-900 rounded border border-slate-700 text-slate-300">{t}</span>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="py-20 border-t border-slate-900 text-center text-slate-600 text-[10px] uppercase font-bold tracking-widest">
                        © 2026 David Ho • Hong Kong
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
